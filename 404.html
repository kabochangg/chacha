<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#1b1b24" />
    <title>ページが見つかりません | 勇者のあとしまつ</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        background: #14141c;
        color: #f6eedf;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
      }

      p {
        margin: 0 0 16px;
        color: #cfc5b3;
        line-height: 1.7;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 8vw, 40px);
        line-height: 1.15;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border: 1px solid #f0c36a;
        border-radius: 8px;
        background: #f0c36a;
        color: #1b1b24;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>ページが見つかりません</h1>
      <p>入口を間違えたようです。拠点に戻って、もう一度ダンジョンへ向かいましょう。</p>
      <a href="/">タイトルへ戻る</a>
    </main>
  </body>
</html>
