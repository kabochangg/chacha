<html lang="ja">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>お問い合わせ | 副業タイプ診断</title><link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" /><link rel="stylesheet" href="/page.css" />
  </head>
  <body>
    <header class="site-header"><a class="logo" href="/">副業タイプ<span>診断</span></a><nav><a href="/#diagnosis">診断する</a><a href="/#types">4つのタイプ</a></nav><a class="header-action" href="/">トップへ</a></header>
    <main class="content-page"><article>
      <p class="section-number">Contact</p><h1>お問い合わせ</h1>
      <p>ご意見、掲載内容に関するご連絡は以下のフォームからお送りください。営業目的の一斉送信には返信できない場合があります。</p>
      <form class="contact-form" id="contact-form">
        <label>お名前<input name="name" autocomplete="name" maxlength="80" required /></label>
        <label>メールアドレス<input name="email" type="email" autocomplete="email" maxlength="254" required /></label>
        <label>お問い合わせ内容<textarea name="message" maxlength="3000" required></textarea></label>
        <label class="honeypot" aria-hidden="true">会社URL<input name="website" tabindex="-1" autocomplete="off" /></label>
        <div id="turnstile-container"></div>
        <button class="button primary" type="submit">送信する</button>
        <p class="form-note">送信により、入力情報をお問い合わせへの回答に利用することに同意したものとします。</p>
        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
      </form>
    </article></main>
    <footer><div class="footer-brand"><a class="logo" href="/">副業タイプ<span>診断</span></a></div><nav class="footer-links"><a href="/operator.html">運営者情報</a><a href="/privacy.html">プライバシーポリシー</a><a href="/disclaimer.html">免責事項</a></nav><p>&copy; 2026 Side Work Finder</p></footer>
    <script src="/config.js"></script><script src="/site-bootstrap.js"></script><script src="/contact.js"></script>
